<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <!-- Gleisner Logo: Full body (G1) -->
  <!-- Mech spacesuit with constellation body -->
  <style>
    .star { fill: #d4af37; }
    .line { stroke: #d4af37; stroke-width: 0.8; opacity: 0.5; }
    .suit { fill: rgba(212,175,55,0.06); stroke: #d4af37; stroke-width: 1.2; }
    .visor { fill: rgba(212,175,55,0.18); stroke: #d4af37; stroke-width: 1.2; }
    .panel { fill: none; stroke: #d4af37; stroke-width: 0.5; opacity: 0.35; }
    .rivet { fill: #d4af37; opacity: 0.4; }
  </style>

  <!-- Body -->
  <path d="M65,72 C65,42 135,42 135,72 L140,195 C140,222 125,235 100,235 C75,235 60,222 60,195 Z" class="suit"/>

  <!-- Visor -->
  <rect x="75" y="58" width="50" height="38" rx="9" class="visor"/>
  <ellipse cx="89" cy="72" rx="4" ry="7" fill="#d4af37" opacity="0.25"/>

  <!-- Panel lines -->
  <line x1="68" y1="108" x2="132" y2="108" class="panel"/>
  <line x1="66" y1="170" x2="134" y2="170" class="panel"/>
  <!-- Chest indicator -->
  <circle cx="100" cy="120" r="2" class="star" opacity="0.5"/>
  <!-- Rivets -->
  <circle cx="68" cy="90" r="1.5" class="rivet"/>
  <circle cx="132" cy="90" r="1.5" class="rivet"/>

  <!-- Backpack -->
  <path d="M140,100 L155,103 L155,180 L140,183 Z" class="suit" stroke-width="0.9"/>
  <line x1="143" y1="125" x2="152" y2="126" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>
  <line x1="143" y1="150" x2="152" y2="151" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>

  <!-- Constellation inside body -->
  <circle cx="82" cy="135" r="2.5" class="star"/>
  <circle cx="115" cy="128" r="2" class="star"/>
  <circle cx="128" cy="152" r="2.5" class="star"/>
  <circle cx="90" cy="175" r="2" class="star"/>
  <circle cx="122" cy="190" r="2.5" class="star"/>
  <circle cx="76" cy="200" r="1.8" class="star"/>
  <circle cx="105" cy="212" r="2" class="star"/>
  <line x1="82" y1="135" x2="115" y2="128" class="line"/>
  <line x1="115" y1="128" x2="128" y2="152" class="line"/>
  <line x1="115" y1="128" x2="90" y2="175" class="line"/>
  <line x1="90" y1="175" x2="122" y2="190" class="line"/>
  <line x1="128" y1="152" x2="122" y2="190" class="line"/>
  <line x1="90" y1="175" x2="76" y2="200" class="line"/>
  <line x1="76" y1="200" x2="105" y2="212" class="line"/>
  <line x1="122" y1="190" x2="105" y2="212" class="line"/>

  <!-- Legs -->
  <rect x="78" y="233" width="16" height="24" rx="5" class="suit"/>
  <rect x="106" y="233" width="16" height="24" rx="5" class="suit"/>
  <!-- Foot plates -->
  <rect x="75" y="254" width="22" height="6" rx="3" class="suit" stroke-width="0.9"/>
  <rect x="103" y="254" width="22" height="6" rx="3" class="suit" stroke-width="0.9"/>

  <!-- Ambient stars -->
  <circle cx="30" cy="55" r="1.8" class="star" opacity="0.35"/>
  <circle cx="170" cy="65" r="2.2" class="star" opacity="0.3"/>
  <circle cx="35" cy="210" r="1.8" class="star" opacity="0.3"/>
  <circle cx="175" cy="200" r="2.2" class="star" opacity="0.35"/>
  <circle cx="42" cy="130" r="1.2" class="star" opacity="0.2"/>
  <circle cx="165" cy="140" r="1.5" class="star" opacity="0.2"/>
</svg>
