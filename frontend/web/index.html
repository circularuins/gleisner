<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!--
    Explicit viewport meta. Flutter's bootstrap inserts a permissive viewport
    on its own, but iOS Safari's visualViewport API behaves more predictably
    when the page declares its viewport up front. Without this, the page is
    laid out at ~980px on first paint and visualViewport.height jitters as
    Safari rescales, which breaks the soft-keyboard height calculation in
    `lib/utils/keyboard_height_observer.dart`.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Gleisner — Your creative journey, your universe">

  <!-- PHASE_0_REVERT: Phase 1 (public launch) 移行時に以下 2 行を削除。docs/phase1-revert-checklist.md 参照 -->
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="googlebot" content="noindex,nofollow">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Gleisner">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>gleisner_web</title>
  <link rel="manifest" href="manifest.json">

  <!--
    PHASE_0: unregister any service worker that earlier deploys registered.
    Combined with `flutter build web --pwa-strategy=none` on Cloudflare
    Pages, this ensures each visitor's next reload fetches main.dart.js
    fresh from the network — iPhone Safari was caching old JS very
    aggressively after a stale SW landed during launch testing, and only
    "Clear History and Data" worked. Tracked in Phase 1 PWA strategy issue.
  -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .getRegistrations()
        .then(function (regs) { regs.forEach(function (r) { r.unregister(); }); })
        .catch(function () {});
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
