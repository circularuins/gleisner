<style>
  :root{
    --bg:#050509;--bg2:#0c0c12;--bg3:#151520;
    --text:#eee;--text2:#8888a0;--text3:#444460;--border:#1a1a28;
    --c-play:#f97316;--c-compose:#a78bfa;--c-life:#22d3ee;--c-english:#84cc16;
    --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden}

  /* Header */
  .hdr{position:sticky;top:0;z-index:100;background:rgba(5,5,9,.94);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);border-bottom:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;min-height:48px}
  .hdr-title{font-size:18px;font-weight:600;letter-spacing:-.02em}
  .hdr-btn{font-size:14px;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none;padding:6px 2px}
  .hdr-btn:active{opacity:.6}
  .hdr-back{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;color:var(--text2)}
  .hdr-back:active{transform:scale(.9)}
  .hdr-back svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.5;fill:none}
  .hdr-spacer{width:36px}

  /* Artist Header */
  .artist-hdr{text-align:center;position:relative}
  .artist-cover{width:100%;height:140px;position:relative;overflow:hidden}
  .artist-cover canvas{width:100%;height:100%;display:block;object-fit:cover}
  .artist-cover-fade{position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,var(--bg))}
  .artist-hdr-body{padding:0 14px 20px;margin-top:-44px;position:relative;z-index:1}
  .artist-avatar{width:80px;height:80px;border-radius:50%;overflow:hidden;margin:0 auto 14px;border:3px solid var(--bg);position:relative;box-shadow:0 2px 12px rgba(0,0,0,.5)}
  .artist-avatar canvas{width:100%;height:100%;display:block}
  .artist-name{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:2px}
  .artist-handle{font-family:var(--mono);font-size:12px;color:var(--text2);margin-bottom:10px}
  .artist-tuned{font-family:var(--mono);font-size:13px;color:var(--text2);margin-bottom:16px}
  .artist-tuned strong{color:var(--text);font-weight:600}
  .artist-actions{display:flex;justify-content:center;gap:8px}
  .btn{padding:9px 22px;border-radius:10px;border:none;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none}
  .btn:active{transform:scale(.95)}
  .btn-tunein{background:var(--c-compose);color:#fff}
  .btn-tunedin{background:var(--bg3);color:var(--c-compose);border:1px solid rgba(167,139,250,.3)}
  .btn-timeline{background:var(--bg3);color:var(--text);border:1px solid var(--border)}

  /* Section dividers */
  .section{padding:0 14px 16px;border-top:1px solid var(--border);margin-top:4px;padding-top:16px}
  .section:first-of-type{border-top:none;margin-top:0}
  .sec-label{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}

  /* Genres */
  .genre-chips{display:flex;gap:6px;flex-wrap:wrap}
  .genre-chip{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);font-size:12px;font-weight:500;white-space:nowrap}
  .genre-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

  /* About */
  .about-meta{font-family:var(--mono);font-size:12px;color:var(--text2);margin-bottom:10px}
  .about-text{font-size:14px;color:var(--text2);line-height:1.7}

  /* Links */
  .link-sub{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;margin-top:10px}
  .link-sub:first-of-type{margin-top:0}
  .link-chips{display:flex;gap:6px;flex-wrap:wrap}
  .link-chip{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .15s;user-select:none;color:var(--text2)}
  .link-chip:active{transform:scale(.95);background:var(--bg3)}

  /* Tracks */
  .track-chips{display:flex;gap:6px;flex-wrap:wrap}
  .track-chip{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);font-size:12px;font-weight:500;white-space:nowrap}
  .track-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

  /* Recent Posts */
  .posts-sub{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;margin-top:12px}
  .posts-sub:first-of-type{margin-top:0}
  .post-card{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
  .post-card:last-child{border-bottom:none}
  .post-card:active{background:rgba(255,255,255,.02);border-radius:8px}
  .post-thumb{width:52px;height:52px;border-radius:10px;overflow:hidden;flex-shrink:0;position:relative}
  .post-thumb canvas{width:100%;height:100%;display:block}
  .post-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
  .post-track{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
  .post-title{font-size:13px;font-weight:500;line-height:1.3;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .post-meta{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;color:var(--text3)}
  .post-reactions{display:flex;gap:4px}
  .post-rpill{font-size:10px}

  /* Demo switcher */
  .switcher{display:flex;gap:6px;overflow-x:auto;padding:0 14px 16px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .switcher::-webkit-scrollbar{display:none}
  .sw-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap;flex-shrink:0}
  .sw-chip.a{background:var(--text);color:var(--bg);border-color:var(--text)}
  .sw-chip:active{transform:scale(.95)}
  .sw-avatar{width:20px;height:20px;border-radius:50%;overflow:hidden}
  .sw-avatar canvas{width:100%;height:100%;display:block}

  /* Toast */
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:12px;color:var(--text2);z-index:1000;font-family:var(--mono);box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity .3s;pointer-events:none}

  /* Bottom nav */
  .bn{position:fixed;bottom:0;left:0;right:0;background:rgba(5,5,9,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100}
  .ni{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--text3);cursor:pointer;padding:4px 12px;text-decoration:none}
  .ni.a{color:var(--text)}.ni svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.5;fill:none}

  .main{padding-bottom:calc(70px + env(safe-area-inset-bottom))}

  ::-webkit-scrollbar{width:0}
</style>
</head>

const GENRE_PALETTE={

  Electronic:{c:'#06b6d4',rgb:'6,182,212'},
  Ambient:{c:'#6366f1',rgb:'99,102,241'},
  'Lo-fi':{c:'#78716c',rgb:'120,113,108'},
  Jazz:{c:'#eab308',rgb:'234,179,8'},
  'Singer-Songwriter':{c:'#fb923c',rgb:'251,146,60'},
  'Visual Art':{c:'#a78bfa',rgb:'167,139,250'},
  'Digital Art':{c:'#c084fc',rgb:'192,132,252'},
  'Generative Art':{c:'#818cf8',rgb:'129,140,248'},
  Illustration:{c:'#a78bfa',rgb:'167,139,250'},
  Writing:{c:'#22d3ee',rgb:'34,211,238'},
  Poetry:{c:'#67e8f9',rgb:'103,232,249'},
  Essay:{c:'#2dd4bf',rgb:'45,212,191'},
  Film:{c:'#84cc16',rgb:'132,204,22'},
  'Short Film':{c:'#a3e635',rgb:'163,230,53'},
  Documentary:{c:'#65a30d',rgb:'101,163,13'},

  'Hardware Art':{c:'#fbbf24',rgb:'251,191,36'},
  DIY:{c:'#f59e0b',rgb:'245,158,11'},
};
function genreColor(genre){
  if(GENRE_PALETTE[genre])return GENRE_PALETTE[genre];
  let h=0;for(let i=0;i<genre.length;i++)h=((h<<5)-h+genre.charCodeAt(i))|0;
  const hue=((h%360)+360)%360;
  const r=Math.round(180+50*Math.cos(hue*Math.PI/180));
  const g=Math.round(180+50*Math.cos((hue-120)*Math.PI/180));
  const b=Math.round(180+50*Math.cos((hue+120)*Math.PI/180));
  return{c:`rgb(${r},${g},${b})`,rgb:`${r},${g},${b}`};
}

// === Utilities (from discover-v1 / profile-v1) ===
function mkRng(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return()=>{h=(h*16807)%2147483647;return(h&0x7fffffff)/0x7fffffff}}

function drawAvatar(cv,seed,size,color){
  const w=size*2;cv.width=w;cv.height=w;
  const ctx=cv.getContext('2d'),rng=mkRng(seed);
  const [cr,cg,cb]=color.split(',').map(Number);
  ctx.fillStyle=`rgb(${12+rng()*8|0},${12+rng()*8|0},${16+rng()*8|0})`;
  ctx.fillRect(0,0,w,w);
  for(let i=0;i<3;i++){
    const g=ctx.createRadialGradient(w*(.2+rng()*.6),w*(.2+rng()*.6),0,w*.5,w*.5,w*(.3+rng()*.4));
    g.addColorStop(0,`rgba(${cr},${cg},${cb},${.15+rng()*.25})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,w,w);
  }
  for(let i=0;i<4+rng()*4;i++){
    ctx.save();ctx.globalAlpha=.04+rng()*.1;
    ctx.fillStyle=`rgb(${cr+rng()*40-20|0},${cg+rng()*40-20|0},${cb+rng()*40-20|0})`;
    ctx.translate(rng()*w,rng()*w);ctx.rotate(rng()*Math.PI*2);
    ctx.beginPath();const s=6+rng()*20;
    ctx.ellipse(0,0,s,s*(.4+rng()*.6),0,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  const id=ctx.getImageData(0,0,w,w),dd=id.data;
  for(let i=0;i<dd.length;i+=4){const n=(rng()-.5)*10;dd[i]+=n;dd[i+1]+=n;dd[i+2]+=n}
  ctx.putImageData(id,0,0);
}

function drawTrendBg(cv,seed,color,w,h){
  cv.width=w*2;cv.height=h*2;
  const ctx=cv.getContext('2d'),cw=cv.width,ch=cv.height,rng=mkRng(seed);
  const [cr,cg,cb]=color.split(',').map(Number);
  ctx.fillStyle=`rgb(${12+rng()*8|0},${12+rng()*8|0},${16+rng()*8|0})`;
  ctx.fillRect(0,0,cw,ch);
  for(let i=0;i<5;i++){
    const g=ctx.createRadialGradient(cw*(.1+rng()*.8),ch*(.1+rng()*.8),0,cw*.5,ch*.5,cw*(.3+rng()*.5));
    g.addColorStop(0,`rgba(${cr},${cg},${cb},${.1+rng()*.2})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,cw,ch);
  }
  for(let i=0;i<6+rng()*5;i++){
    ctx.save();ctx.globalAlpha=.03+rng()*.08;
    ctx.fillStyle=`rgb(${cr+rng()*40-20|0},${cg+rng()*40-20|0},${cb+rng()*40-20|0})`;
    ctx.translate(rng()*cw,rng()*ch);ctx.rotate(rng()*Math.PI*2);
    ctx.beginPath();const s=8+rng()*40;
    ctx.ellipse(0,0,s,s*(.4+rng()*.6),0,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  const id=ctx.getImageData(0,0,cw,ch),dd=id.data;
  for(let i=0;i<dd.length;i+=4){const n=(rng()-.5)*12;dd[i]+=n;dd[i+1]+=n;dd[i+2]+=n}
  ctx.putImageData(id,0,0);
}

function fmtN(n){
  if(n>=10000)return(n/1000).toFixed(1)+'k';
  if(n>=1000)return(n/1000).toFixed(1)+'k';
  return n.toString();
}

function showToast(msg,duration=2000){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},duration);
}

// === State ===
const MY_ARTIST_ID='a01'; // yuta_flamenco is "me"
let currentArtist=ARTISTS[0]; // default: yuta_flamenco
let tunedInState={}; // id -> boolean
ARTISTS.forEach(a=>{tunedInState[a.id]=false});

function isSelf(){return currentArtist.id===MY_ARTIST_ID}

// === Render ===
function render(){
  renderHeader();
  renderMain();
}

function renderHeader(){
  const hdr=document.getElementById('hdr');
  if(isSelf()){
    hdr.innerHTML=`
      <div class="hdr-spacer"></div>
      <div class="hdr-title">Artist Page</div>
      <div class="hdr-btn" onclick="showToast('Section editing → coming soon')">Edit</div>`;
  }else{
    hdr.innerHTML=`
      <div class="hdr-back" onclick="showToast('← Back to previous page')">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div class="hdr-title">${currentArtist.displayName}</div>
      <div class="hdr-spacer"></div>`;
  }
}

function renderMain(){
  const main=document.getElementById('main');
  main.innerHTML='';

  // Demo switcher
  const swLabel=document.createElement('div');swLabel.className='sec';swLabel.style.padding='12px 14px 0';
  swLabel.innerHTML='<div class="sec-label" style="color:#ef4444">DEMO: SWITCH ARTIST</div>';
  main.appendChild(swLabel);
  const switcher=document.createElement('div');switcher.className='switcher';
  ARTISTS.forEach(a=>{
    const chip=document.createElement('div');
    chip.className='sw-chip'+(a.id===currentArtist.id?' a':'');
    const avWrap=document.createElement('div');avWrap.className='sw-avatar';
    const cv=document.createElement('canvas');
    drawAvatar(cv,a.name,20,a.color);
    avWrap.appendChild(cv);
    chip.appendChild(avWrap);
    chip.appendChild(document.createTextNode(a.id===MY_ARTIST_ID?'Me ('+a.displayName+')':a.displayName));
    chip.onclick=()=>switchArtist(a);
    switcher.appendChild(chip);
  });
  main.appendChild(switcher);

  // Section 1: Artist Header
  renderArtistHeader(main);

  // Section 2: Genres
  renderGenres(main);

  // Section 3: About
  renderAbout(main);

  // Section 4: Links
  renderLinks(main);

  // Section 5: Tracks
  renderTracks(main);

  // Section 6: Recent Posts
  renderRecentPosts(main);
}

function renderArtistHeader(main){
  const sec=document.createElement('div');sec.className='artist-hdr';

  // Cover image
  const cover=document.createElement('div');cover.className='artist-cover';
  const coverCv=document.createElement('canvas');
  drawTrendBg(coverCv,currentArtist.name+'_cover',currentArtist.color,400,140);
  cover.appendChild(coverCv);
  const fade=document.createElement('div');fade.className='artist-cover-fade';
  cover.appendChild(fade);
  sec.appendChild(cover);

  // Body (overlaps cover via negative margin)
  const body=document.createElement('div');body.className='artist-hdr-body';

  // Avatar
  const avatarWrap=document.createElement('div');avatarWrap.className='artist-avatar';
  const cv=document.createElement('canvas');
  drawAvatar(cv,currentArtist.name,80,currentArtist.color);
  avatarWrap.appendChild(cv);
  body.appendChild(avatarWrap);

  // Name
  const name=document.createElement('div');name.className='artist-name';
  name.textContent=currentArtist.displayName;
  body.appendChild(name);

  // Handle
  const handle=document.createElement('div');handle.className='artist-handle';
  handle.textContent='@'+currentArtist.name;
  body.appendChild(handle);

  // Tuned In count
  const tuned=document.createElement('div');tuned.className='artist-tuned';
  tuned.innerHTML='<strong>'+fmtN(currentArtist.tunedInCount)+'</strong> tuned in';
  body.appendChild(tuned);

  // Action buttons
  const actions=document.createElement('div');actions.className='artist-actions';
  if(isSelf()){
    const timelineBtn=document.createElement('button');timelineBtn.className='btn btn-timeline';
    timelineBtn.textContent='View Timeline';
    timelineBtn.onclick=()=>showToast('Timeline に移動 (Artist Mode)');
    actions.appendChild(timelineBtn);
  }else{
    const isTuned=tunedInState[currentArtist.id];

    const tuneBtn=document.createElement('button');
    tuneBtn.className='btn '+(isTuned?'btn-tunedin':'btn-tunein');
    tuneBtn.textContent=isTuned?'Tuned In ✓':'Tune In';
    tuneBtn.onclick=()=>toggleTuneIn(currentArtist);
    actions.appendChild(tuneBtn);

    if(isTuned){
      const timelineBtn=document.createElement('button');timelineBtn.className='btn btn-timeline';
      timelineBtn.textContent='View Timeline';
      timelineBtn.onclick=()=>showToast('Timeline に移動');
      actions.appendChild(timelineBtn);
    }
  }
  body.appendChild(actions);
  sec.appendChild(body);
  main.appendChild(sec);
}

function renderGenres(main){
  const sec=document.createElement('div');sec.className='section';
  const label=document.createElement('div');label.className='sec-label';label.textContent='GENRES';
  sec.appendChild(label);

  const chips=document.createElement('div');chips.className='genre-chips';
  currentArtist.genres.forEach(g=>{
    const gc=genreColor(g);
    const chip=document.createElement('div');chip.className='genre-chip';
    const dot=document.createElement('span');dot.className='genre-dot';dot.style.background=gc.c;
    chip.appendChild(dot);
    chip.appendChild(document.createTextNode(g));
    chips.appendChild(chip);
  });
  sec.appendChild(chips);
  main.appendChild(sec);
}

function renderAbout(main){
  const sec=document.createElement('div');sec.className='section';
  const label=document.createElement('div');label.className='sec-label';label.textContent='ABOUT';
  sec.appendChild(label);

  // Location + Active since
  if(currentArtist.location||currentArtist.activeSince){
    const meta=document.createElement('div');meta.className='about-meta';
    const parts=[];
    if(currentArtist.location)parts.push('📍 '+currentArtist.location);
    if(currentArtist.activeSince)parts.push('Active since '+currentArtist.activeSince);
    meta.textContent=parts.join(' · ');
    sec.appendChild(meta);
  }

  // Bio
  const text=document.createElement('div');text.className='about-text';
  text.textContent=currentArtist.bio||currentArtist.tagline;
  sec.appendChild(text);
  main.appendChild(sec);
}

function renderLinks(main){
  const links=currentArtist.links;
  if(!links)return;
  const hasMusic=links.music&&links.music.length>0;
  const hasSns=links.sns&&links.sns.length>0;
  if(!hasMusic&&!hasSns)return;

  const sec=document.createElement('div');sec.className='section';
  const label=document.createElement('div');label.className='sec-label';label.textContent='LINKS';
  sec.appendChild(label);

  const iconMap={spotify:'🎵',['apple-music']:'🎵',soundcloud:'☁️',bandcamp:'🎸',instagram:'📷',x:'𝕏',youtube:'▶️'};

  if(hasMusic){
    const sub=document.createElement('div');sub.className='link-sub';sub.textContent='MUSIC';
    sec.appendChild(sub);
    const chips=document.createElement('div');chips.className='link-chips';
    links.music.forEach(l=>{
      const chip=document.createElement('div');chip.className='link-chip';
      chip.textContent=(iconMap[l.type]||'🔗')+' '+l.label;
      chip.onclick=()=>showToast('🔗 '+l.label+' → '+l.url);
      chips.appendChild(chip);
    });
    sec.appendChild(chips);
  }

  if(hasSns){
    const sub=document.createElement('div');sub.className='link-sub';sub.textContent='SNS';
    sec.appendChild(sub);
    const chips=document.createElement('div');chips.className='link-chips';
    links.sns.forEach(l=>{
      const chip=document.createElement('div');chip.className='link-chip';
      chip.textContent=(iconMap[l.type]||'🔗')+' '+l.label;
      chip.onclick=()=>showToast('🔗 '+l.label+' → '+l.url);
      chips.appendChild(chip);
    });
    sec.appendChild(chips);
  }

  main.appendChild(sec);
}

function renderTracks(main){
  const sec=document.createElement('div');sec.className='section';
  const label=document.createElement('div');label.className='sec-label';label.textContent='TRACKS';
  sec.appendChild(label);

  const sub=document.createElement('div');sub.className='about-meta';sub.style.marginBottom='10px';
  sub.textContent='This artist\u2019s content streams';
  sec.appendChild(sub);

  const chips=document.createElement('div');chips.className='track-chips';
  currentArtist.tracks.forEach(t=>{
    const tc=trackColor(t);
    const chip=document.createElement('div');chip.className='track-chip';
    const dot=document.createElement('span');dot.className='track-dot';dot.style.background=tc.c;
    chip.appendChild(dot);
    chip.appendChild(document.createTextNode(t));
    chips.appendChild(chip);
  });
  sec.appendChild(chips);
  main.appendChild(sec);
}

function renderRecentPosts(main){
  const posts=POSTS[currentArtist.id]||[];
  if(posts.length===0)return;

  const sec=document.createElement('div');sec.className='section';
  const label=document.createElement('div');label.className='sec-label';label.textContent='RECENT POSTS';
  sec.appendChild(label);

  // Latest 3
  const latestLabel=document.createElement('div');latestLabel.className='posts-sub';latestLabel.textContent='Latest';
  sec.appendChild(latestLabel);
  const latest=posts.slice(0,3);
  latest.forEach(p=>sec.appendChild(makePostCard(p)));

  // Popular 3
  const popular=posts.filter(p=>p.isPopular).slice(0,3);
  if(popular.length>0){
    const popLabel=document.createElement('div');popLabel.className='posts-sub';popLabel.textContent='Popular';
    sec.appendChild(popLabel);
    popular.forEach(p=>sec.appendChild(makePostCard(p)));
  }

  main.appendChild(sec);
}

function makePostCard(post){
  const card=document.createElement('div');card.className='post-card';
  card.onclick=()=>showToast('投稿詳細 → coming soon');

  // Thumbnail
  const thumb=document.createElement('div');thumb.className='post-thumb';
  const tc=trackColor(post.track);
  const cv=document.createElement('canvas');
  drawTrendBg(cv,post.id+post.title,tc.rgb,52,52);
  cv.style.cssText='width:100%;height:100%;display:block';
  thumb.appendChild(cv);
  card.appendChild(thumb);

  // Body
  const body=document.createElement('div');body.className='post-body';

  const trackLabel=document.createElement('div');trackLabel.className='post-track';
  trackLabel.style.color=tc.c;trackLabel.textContent=post.track;
  body.appendChild(trackLabel);

  const title=document.createElement('div');title.className='post-title';
  title.textContent=post.title;
  body.appendChild(title);

  const meta=document.createElement('div');meta.className='post-meta';

  // Reactions
  const reactWrap=document.createElement('span');reactWrap.className='post-reactions';
  const top=Object.entries(post.reactions).sort((a,b)=>b[1]-a[1]).slice(0,2);
  top.forEach(([emoji,cnt])=>{
    const pill=document.createElement('span');pill.className='post-rpill';
    pill.textContent=emoji+' '+cnt;
    reactWrap.appendChild(pill);
  });
  meta.appendChild(reactWrap);

  const time=document.createElement('span');time.textContent=post.timeAgo;
  meta.appendChild(time);

  body.appendChild(meta);
  card.appendChild(body);
  return card;
}

// === Actions ===
function switchArtist(artist){
  currentArtist=artist;
  render();
}

function toggleTuneIn(artist){
  tunedInState[artist.id]=!tunedInState[artist.id];
  const now=tunedInState[artist.id];
  showToast(now?'Tuned In to '+artist.displayName:'Untuned from '+artist.displayName);
  render();
}

// === Init ===
render();
