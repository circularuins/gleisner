<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gleisner — Timeline v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050509;--bg2:#0c0c12;--bg3:#151520;
    --text:#eee;--text2:#8888a0;--text3:#444460;--border:#1a1a28;
    --c-play:#f97316;--c-compose:#a78bfa;--c-life:#22d3ee;--c-english:#84cc16;
    --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden}

  /* Header */
  .hdr{position:sticky;top:0;z-index:100;background:rgba(5,5,9,.94);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);border-bottom:1px solid var(--border);padding:10px 14px 8px}
  .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .artist{font-size:17px;font-weight:600;letter-spacing:-.02em}
  .live{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--text3)}
  .live-dot{width:5px;height:5px;border-radius:50%;background:#ef4444;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .chips{display:flex;gap:4px;flex-wrap:wrap}
  .chip{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:16px;border:1px solid var(--border);background:var(--bg2);font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;user-select:none;white-space:nowrap}
  .chip .d{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .chip.muted{opacity:.2}.chip.solo{border-color:var(--cc);box-shadow:0 0 10px var(--cg)}
  .chip .sb,.chip .mb{font-family:var(--mono);font-size:7px;font-weight:700;width:15px;height:15px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
  .chip .sb.on{background:#facc15;color:#000;border-color:#facc15}
  .chip .mb.on{background:#ef4444;color:#fff;border-color:#ef4444}

  /* Timeline */
  .tl{position:relative;display:flex;padding-bottom:90px;z-index:1}
  .spine{width:36px;flex-shrink:0;position:relative}
  .spine-line{position:absolute;left:50%;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,rgba(239,68,68,0.3) 0%,var(--border) 8%,var(--border) 100%)}
  .spine-mark{position:absolute;left:0;width:100%;display:flex;flex-direction:column;align-items:center;transform:translateY(-50%);z-index:2}
  .spine-mark .dy{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text);line-height:1;background:var(--bg);padding:2px 0}
  .spine-mark .mo{font-family:var(--mono);font-size:7px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase}
  .spine-mark.today .dy{color:#ef4444}
  .spine-mark .now-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;margin-top:3px;animation:pulse 2s ease-in-out infinite}
  .canvas{flex:1;position:relative;min-height:100px}

  /* Synapse SVG */
  .syn-layer{position:absolute;inset:0;pointer-events:none;z-index:1}

  /* Item node */
  .node{
    position:absolute;z-index:3;cursor:pointer;
    transition:transform .2s ease,box-shadow .2s ease,opacity .3s;
    overflow:visible;
  }
  .node:hover{transform:scale(1.05);z-index:50}
  .node:active{transform:scale(0.97)}
  .node.hidden{opacity:0;pointer-events:none;transform:scale(0.8)}

  .node-card{
    position:relative;overflow:hidden;
    background:var(--bg2);
    border:1px solid rgba(255,255,255,.06);
  }

  /* Track-specific border radius: organic variation without blob ugliness */
  .node[data-t="play"] .node-card{border-radius:16px 8px 16px 8px}
  .node[data-t="compose"] .node-card{border-radius:8px 16px 8px 16px}
  .node[data-t="life"] .node-card{border-radius:20px}
  .node[data-t="english"] .node-card{border-radius:12px}

  /* Glow aura (outside the card, not clipping content) */
  .node-aura{
    position:absolute;inset:-3px;border-radius:inherit;
    pointer-events:none;z-index:-1;
    opacity:0;transition:opacity .3s;
  }
  .node.glow .node-aura{opacity:1}

  /* Media area */
  .node-media{position:relative;overflow:hidden;border-radius:inherit;border-bottom-left-radius:0;border-bottom-right-radius:0}
  .node-media canvas{display:block;width:100%;height:100%}

  .node-icon{
    position:absolute;top:5px;left:6px;z-index:6;
    width:20px;height:20px;border-radius:50%;
    background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;line-height:1;
    border:1px solid rgba(255,255,255,.08);
  }
  .node-sm .node-icon{width:16px;height:16px;font-size:9px}

  .node-dur{
    position:absolute;bottom:4px;right:5px;z-index:6;
    font-family:var(--mono);font-size:7px;font-weight:600;
    background:rgba(0,0,0,.75);color:var(--text);padding:2px 5px;border-radius:4px;
  }
  .node-sm .node-dur{font-size:6px;padding:1px 3px}

  .node-comments{
    position:absolute;top:5px;right:5px;z-index:6;
    font-family:var(--mono);font-size:7px;font-weight:600;
    background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
    color:var(--text2);padding:2px 5px;border-radius:8px;
    display:flex;align-items:center;gap:2px;
    border:1px solid rgba(255,255,255,.06);
  }
  .node-sm .node-comments{font-size:6px;padding:1px 3px}

  /* Info bar (below media) */
  .node-info{padding:5px 7px;background:var(--bg2)}
  .node-info-track{font-family:var(--mono);font-size:6px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;opacity:.6;margin-bottom:1px}
  .node-info-title{font-size:10px;font-weight:500;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

  /* Reaction pills (below card, not clipped) */
  .node-reacts{
    display:flex;gap:2px;justify-content:center;
    margin-top:4px;white-space:nowrap;
  }
  .rpill{
    display:flex;align-items:center;gap:1px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.06);
    border-radius:10px;padding:2px 5px 2px 3px;
    font-size:10px;line-height:1;
  }
  .rpill .rc{font-family:var(--mono);font-size:7px;font-weight:600;color:var(--text2)}
  .node-sm .rpill{font-size:8px;padding:1px 3px 1px 2px}
  .node-sm .rpill .rc{font-size:6px}

  /* Expanded overlay */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:500;display:none;align-items:flex-end;justify-content:center}
  .ov.vis{display:flex}
  .ex{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:420px;max-height:85dvh;overflow-y:auto;animation:su .3s ease}
  @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .ex-handle{width:36px;height:4px;border-radius:2px;background:var(--text3);margin:10px auto 0}
  .ex-media{margin:12px 14px 0;border-radius:12px;overflow:hidden;aspect-ratio:16/9;background:var(--bg3);display:flex;align-items:center;justify-content:center;position:relative}
  .ex-media canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .ex-play{position:relative;z-index:2;width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;border:1px solid rgba(255,255,255,.15)}
  .ex-dur{position:absolute;bottom:8px;right:10px;z-index:2;font-family:var(--mono);font-size:11px;background:rgba(0,0,0,.7);padding:3px 8px;border-radius:4px;color:var(--text)}
  .ex-body{padding:14px 16px 16px}
  .ex-tag{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:10px}
  .ex-title{font-size:19px;font-weight:600;line-height:1.35;margin-bottom:8px}
  .ex-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px}
  .ex-reacts{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .ex-rpill{display:flex;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:4px 10px 4px 6px;font-size:14px}
  .ex-rpill .erc{font-family:var(--mono);font-size:11px;color:var(--text2)}
  .ex-meta{font-family:var(--mono);font-size:10px;color:var(--text3);display:flex;gap:12px}

  /* Media type badge & track tag on media */
  .ex-media-tag{position:absolute;top:8px;left:10px;z-index:3;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:4px;display:flex;align-items:center;gap:4px}
  .ex-media-type{position:absolute;top:8px;right:10px;z-index:3;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.05em;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);color:var(--text2);padding:3px 7px;border-radius:4px}
  .ex-play{cursor:pointer;transition:transform .15s}
  .ex-play:active{transform:scale(.9)}

  /* Reaction pills - interactive */
  .ex-rpill{cursor:pointer;transition:all .15s;user-select:none}
  .ex-rpill:active{transform:scale(.9)}
  .ex-rpill.reacted{border-color:currentColor;background:rgba(255,255,255,.1)}
  @keyframes rpill-bounce{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
  .ex-rpill.bounce{animation:rpill-bounce .25s ease}

  /* Add reaction button */
  .ex-add-react{display:flex;align-items:center;gap:3px;background:transparent;border:1px dashed var(--border);border-radius:14px;padding:4px 10px;font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s;user-select:none}
  .ex-add-react:hover{border-color:var(--text2);color:var(--text2)}

  /* Emoji palette popover */
  .emoji-palette{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:6px 8px;display:flex;gap:4px;z-index:10;box-shadow:0 -4px 20px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .15s,transform .15s;transform:translateX(-50%) translateY(6px)}
  .emoji-palette.vis{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
  .emoji-palette button{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;border-radius:6px;transition:background .1s;line-height:1}
  .emoji-palette button:hover{background:rgba(255,255,255,.1)}
  .emoji-palette button:active{transform:scale(.85)}

  /* Section divider */
  .ex-divider{height:1px;background:var(--border);margin:14px 0}

  /* Stats bar */
  .ex-stats{font-family:var(--mono);font-size:10px;color:var(--text3);display:flex;gap:12px;margin-bottom:0}

  /* Comments section */
  .ex-comments-hdr{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .ex-comments-hdr .cnt{font-family:var(--mono);font-size:11px;color:var(--text3);font-weight:400}
  .ex-comment{display:flex;gap:8px;margin-bottom:12px}
  .ex-comment-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
  .ex-comment-body{flex:1;min-width:0}
  .ex-comment-head{display:flex;align-items:baseline;gap:6px;margin-bottom:2px}
  .ex-comment-user{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text)}
  .ex-comment-time{font-family:var(--mono);font-size:9px;color:var(--text3)}
  .ex-comment-text{font-size:13px;color:var(--text2);line-height:1.5}
  .ex-view-all{font-family:var(--mono);font-size:11px;color:var(--text3);cursor:pointer;padding:4px 0;margin-bottom:8px}
  .ex-view-all:hover{color:var(--text2)}

  /* Comment input (sticky) */
  .ex-comment-input{position:sticky;bottom:0;background:var(--bg2);border-top:1px solid var(--border);padding:10px 16px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;align-items:center;z-index:5}
  .ex-comment-input input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;transition:border-color .15s}
  .ex-comment-input input::placeholder{color:var(--text3)}
  .ex-comment-input input:focus{border-color:var(--text3)}
  .ex-comment-input button{width:32px;height:32px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;cursor:pointer;transition:opacity .15s;flex-shrink:0}
  .ex-comment-input button:disabled{opacity:.3;cursor:default}

  /* Connected posts section */
  .ex-connected-hdr{font-size:14px;font-weight:600;margin-bottom:10px}
  .ex-connected-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .ex-connected-scroll::-webkit-scrollbar{display:none}
  .ex-conn-card{flex-shrink:0;width:140px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px;cursor:pointer;transition:transform .15s,border-color .15s;user-select:none}
  .ex-conn-card:active{transform:scale(.96)}
  .ex-conn-card:hover{border-color:var(--text3)}
  .ex-conn-node{width:48px;height:48px;border-radius:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;font-size:20px;position:relative;overflow:hidden}
  .ex-conn-node canvas{position:absolute;inset:0;width:100%;height:100%}
  .ex-conn-node .icon-ov{position:relative;z-index:2}
  .ex-conn-title{font-size:11px;font-weight:500;line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .ex-conn-track{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
  .ex-conn-badge{font-size:8px;font-family:var(--mono);color:var(--text3);margin-top:4px;display:flex;align-items:center;gap:3px}
  .ex-view-thread{font-family:var(--mono);font-size:11px;color:var(--text3);cursor:pointer;padding:8px 0 0;display:flex;align-items:center;gap:4px}
  .ex-view-thread:hover{color:var(--text2)}

  /* Back button for navigation */
  .ex-back{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:11px;color:var(--text3);cursor:pointer;padding:0 16px;margin-top:8px;transition:color .15s;user-select:none}
  .ex-back:hover{color:var(--text2)}

  /* FAB (Artist Mode only) */
  .fab{position:fixed;bottom:calc(64px + env(safe-area-inset-bottom));right:16px;width:56px;height:56px;border-radius:50%;background:var(--c-compose);border:none;color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:200;box-shadow:0 4px 20px rgba(167,139,250,.4);transition:transform .15s,opacity .2s;user-select:none}
  .fab:active{transform:scale(.9)}
  .fab.hidden{opacity:0;pointer-events:none;transform:scale(.6)}

  /* Mode badge */
  .mode-badge{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;background:rgba(167,139,250,.2);color:var(--c-compose);padding:2px 7px;border-radius:10px;margin-left:8px;display:none}
  .mode-badge.vis{display:inline-block}

  /* Quick-switch avatar button */
  .qs-btn{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:border-color .15s;user-select:none;flex-shrink:0}
  .qs-btn:hover{border-color:var(--text3)}
  .qs-btn:active{transform:scale(.9)}

  /* Context menu */
  .ctx-menu{position:fixed;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:4px;z-index:600;box-shadow:0 8px 32px rgba(0,0,0,.6);min-width:160px;display:none}
  .ctx-menu.vis{display:block}
  .ctx-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;font-size:13px;color:var(--text);cursor:pointer;transition:background .1s;user-select:none}
  .ctx-item:hover{background:rgba(255,255,255,.06)}
  .ctx-item:active{background:rgba(255,255,255,.1)}
  .ctx-item.danger{color:#ef4444}

  /* Confirm dialog */
  .confirm-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:700;display:none;align-items:center;justify-content:center}
  .confirm-ov.vis{display:flex}
  .confirm-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:300px;width:90%;text-align:center}
  .confirm-card h3{font-size:16px;font-weight:600;margin-bottom:8px}
  .confirm-card p{font-size:13px;color:var(--text2);margin-bottom:20px}
  .confirm-btns{display:flex;gap:10px;justify-content:center}
  .confirm-btns button{flex:1;padding:10px;border-radius:10px;border:none;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s}
  .confirm-btns .cb-cancel{background:var(--bg3);color:var(--text)}
  .confirm-btns .cb-delete{background:#ef4444;color:#fff}
  .confirm-btns button:active{opacity:.7}

  /* Bottom sheet more button */
  .ex-more-btn{position:absolute;top:12px;right:14px;width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:none;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text2);z-index:6;transition:background .15s}
  .ex-more-btn:hover{background:rgba(255,255,255,.1)}
  .ex-more-btn.vis{display:flex}

  /* Edit mode */
  .edit-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:var(--font);font-size:inherit;color:var(--text);outline:none;transition:border-color .15s;resize:vertical}
  .edit-input:focus{border-color:var(--text3)}
  .edit-bar{display:flex;gap:8px;margin-top:10px}
  .edit-bar button{padding:8px 18px;border-radius:8px;border:none;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s}
  .edit-bar .eb-save{background:var(--c-compose);color:#fff}
  .edit-bar .eb-cancel{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
  .edit-bar button:active{opacity:.7}

  /* Toast */
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:12px;color:var(--text2);z-index:1000;font-family:var(--mono);box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity .3s;pointer-events:none}

  .bn{position:fixed;bottom:0;left:0;right:0;background:rgba(5,5,9,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100}
  .ni{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--text3);cursor:pointer;padding:4px 12px}
  .ni.a{color:var(--text)}.ni svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.5;fill:none}
  ::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div style="display:flex;align-items:center">
      <div class="artist" id="artistName">Artist Name</div>
      <span class="mode-badge" id="modeBadge">ARTIST</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="live"><div class="live-dot"></div>LIVE</div>
      <div class="qs-btn" id="qsBtn" onclick="toggleArtistMode()" title="Switch to your timeline">🎨</div>
    </div>
  </div>
  <div class="chips" id="chips"></div>
</div>
<div class="tl">
  <div class="spine" id="spine"><div class="spine-line"></div></div>
  <div class="canvas" id="canvas"><svg class="syn-layer" id="syn"></svg></div>
</div>

function genComments(item){
  const rng=mkRng('cmt-'+item.title);
  const n=Math.min(item.comments||0,5);
  const comments=[];
  for(let i=0;i<n;i++){
    const ui=Math.floor(rng()*USERS.length);
    const ci=Math.floor(rng()*COMMENT_POOL.length);
    const mins=Math.floor(rng()*1440);
    comments.push({user:USERS[ui],avatar:AVATARS[ui],text:COMMENT_POOL[ci],mins});
  }
  return comments;
}

const EMOJI_PRESET=['🔥','❤️','👏','✨','😍','🎵','💪','🙏'];
// Runtime reaction state (tracks user's own reactions)
const userReacts=new Map(); // key: item title, value: Set of emoji

const state={solo:null,muted:new Set()};
function mkRng(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return()=>{h=(h*16807)%2147483647;return(h&0x7fffffff)/0x7fffffff}}
function totalR(r){return Object.values(r||{}).reduce((a,b)=>a+b,0)}
function topR(r,n){return Object.entries(r||{}).sort((a,b)=>b[1]-a[1]).slice(0,n)}
function nodeSize(it){
  const eng=totalR(it.reacts)+(it.comments||0)*3+(it.views||0)*.01;
  return Math.round(46+Math.min(it.imp+Math.min(Math.log10(eng+1)/4,.35),1)*124);
}

function drawThumb(cv,it,w,h){
  cv.width=w*2;cv.height=h*2;
  const ctx=cv.getContext('2d'),cw=cv.width,ch=cv.height;
  const[cr,cg,cb]=TC[it.t].rgb.split(',').map(Number);
  const rng=mkRng(it.title+it.d);
  ctx.fillStyle=`rgb(${12+rng()*8|0},${12+rng()*8|0},${16+rng()*8|0})`;ctx.fillRect(0,0,cw,ch);
  for(let i=0;i<4;i++){const g=ctx.createRadialGradient(cw*(.1+rng()*.8),ch*(.1+rng()*.8),0,cw*.5,ch*.5,cw*(.3+rng()*.5));g.addColorStop(0,`rgba(${cr},${cg},${cb},${.1+rng()*.2})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,cw,ch)}
  for(let i=0;i<5+rng()*6;i++){ctx.save();ctx.globalAlpha=.03+rng()*.08;ctx.fillStyle=`rgb(${cr+rng()*40-20|0},${cg+rng()*40-20|0},${cb+rng()*40-20|0})`;ctx.translate(rng()*cw,rng()*ch);ctx.rotate(rng()*Math.PI*2);ctx.beginPath();const s=8+rng()*40;ctx.ellipse(0,0,s,s*(.4+rng()*.6),0,0,Math.PI*2);ctx.fill();ctx.restore()}
  const id=ctx.getImageData(0,0,cw,ch),dd=id.data;for(let i=0;i<dd.length;i+=4){const n=(rng()-.5)*12;dd[i]+=n;dd[i+1]+=n;dd[i+2]+=n}ctx.putImageData(id,0,0);
}

function buildChips(){
  const el=document.getElementById('chips');el.innerHTML='';
  TK.forEach(t=>{const c=document.createElement('div');c.className='chip';c.dataset.track=t;c.style.setProperty('--cc',TC[t].c);c.style.setProperty('--cg',`rgba(${TC[t].rgb},0.35)`);c.innerHTML=`<span class="d" style="background:${TC[t].c}"></span>${TN[t]}<button class="sb" data-t="${t}" onclick="event.stopPropagation();toggleSolo('${t}')">S</button><button class="mb" data-t="${t}" onclick="event.stopPropagation();toggleMute('${t}')">M</button>`;el.appendChild(c)});
}

function layout(){
  const canvas=document.getElementById('canvas');
  canvas.querySelectorAll('.node').forEach(e=>e.remove());
  const sorted=[...DATA].sort((a,b)=>(a.d-b.d)||(b.h-a.h));
  const dayMap={};sorted.forEach(it=>{if(!dayMap[it.d])dayMap[it.d]=[];dayMap[it.d].push(it)});
  const dayKeys=Object.keys(dayMap).map(Number).sort((a,b)=>a-b);

  // === TWO-PASS LAYOUT ===
  // Pass 1: Place items with generous initial day heights
  // Pass 2: Compact — shrink each day to tightly fit actual placed items

  const cW=Math.max(window.innerWidth-36, 200);
  const PAD=12;

  // Initial generous height per day (will be compacted)
  let dayY={},y=20;
  for(let i=0;i<dayKeys.length;i++){
    const dk=dayKeys[i];
    if(i>0&&dk-dayKeys[i-1]>1)y+=20;
    const items=dayMap[dk];
    // Generous: tallest item height × number of items (enough for vertical spread)
    let maxItemH=0;
    items.forEach(it=>{
      const sz=nodeSize(it);
      const h=sz>110?sz*0.7+30+18:sz*0.85+(sz>70?30:0)+(sz>=50?18:0);
      maxItemH=Math.max(maxItemH,h);
    });
    const h=Math.max(100, maxItemH*items.length*0.7);
    dayY[dk]={top:y,height:h};y+=h;
  }

  // Place items (pass 1)
  const rng=mkRng('constellation-v3');
  const placedItems=[]; // {x,y,w,h,item,day}

  function ovAmt(x,y,w,h){
    const pad=10;let worst=0;
    for(const p of placedItems){const ox=Math.max(0,Math.min(x+w,p.x+p.w)-Math.max(x,p.x)+pad);const oy=Math.max(0,Math.min(y+h,p.y+p.h)-Math.max(y,p.y)+pad);if(ox>0&&oy>0)worst=Math.max(worst,ox*oy)}
    return worst;
  }

  const bySize=[...sorted].sort((a,b)=>nodeSize(b)-nodeSize(a));

  bySize.forEach(item=>{
    const dI=dayY[item.d];if(!dI)return;
    const sz=nodeSize(item);
    const w=sz>110?Math.min(sz*1.25,cW-20):sz;
    const mediaH=sz>110?sz*0.7:sz*0.85;
    const infoH=sz>70?30:0;
    const reactH=sz>=50?18:0;
    const h=mediaH+infoH;
    const totalNodeH=h+reactH;

    const hourFrac=item.h/24;
    const yBase=dI.top+hourFrac*(dI.height-totalNodeH);
    const margin=8;

    let bx=margin+rng()*(cW-w-margin*2),by=yBase,bo=Infinity;
    for(let a=0;a<28;a++){
      const xC=margin+rng()*(cW-w-margin*2);
      const yN=(rng()-.5)*60;
      const yC=Math.max(dI.top+4,Math.min(dI.top+dI.height-totalNodeH-4,yBase+yN));
      const ov=ovAmt(xC,yC,w,totalNodeH);
      if(ov<bo){bo=ov;bx=xC;by=yC;if(ov===0)break}
    }
    placedItems.push({x:bx,y:by,w,h:totalNodeH,item,day:item.d});
  });

  // === Pass 2: Compact ===
  // For each day, find actual min/max Y of placed items, then shift everything up
  const TIGHT_PAD=14; // padding above/below tightest items
  let compactY=20;
  const dayCompact={}; // dk -> {newTop, newHeight, shift}

  dayKeys.forEach((dk,i)=>{
    if(i>0&&dk-dayKeys[i-1]>1)compactY+=20;
    const dayItems=placedItems.filter(p=>p.day===dk);
    if(dayItems.length===0){
      dayCompact[dk]={newTop:compactY,newHeight:40,shift:0};
      compactY+=40;return;
    }
    const minY=Math.min(...dayItems.map(p=>p.y));
    const maxY=Math.max(...dayItems.map(p=>p.y+p.h));
    const actualH=maxY-minY;
    const newHeight=actualH+TIGHT_PAD*2;
    const shift=compactY+TIGHT_PAD-minY; // how much to shift items down/up
    dayCompact[dk]={newTop:compactY,newHeight,shift};
    compactY+=newHeight;
  });

  // Apply compaction: shift all item positions
  placedItems.forEach(p=>{
    const dc=dayCompact[p.day];
    if(dc) p.y+=dc.shift;
  });

  const totalH=compactY+40;
  canvas.style.height=totalH+'px';
  document.getElementById('spine').style.height=totalH+'px';

  // Spine marks at compacted positions
  const spine=document.getElementById('spine');
  spine.querySelectorAll('.spine-mark').forEach(m=>m.remove());
  const today=new Date();
  dayKeys.forEach(dk=>{
    const dc=dayCompact[dk];if(!dc)return;
    const d=new Date(today);d.setDate(today.getDate()-dk);
    const mark=document.createElement('div');mark.className='spine-mark'+(dk===0?' today':'');
    mark.style.top=(dc.newTop+6)+'px';
    mark.innerHTML=`<span class="dy">${d.getDate()}</span><span class="mo">${d.toLocaleString('en',{month:'short'})}</span>`;
    if(dk===0)mark.innerHTML+='<div class="now-dot"></div>';
    spine.appendChild(mark);
  });

  // Render nodes from placedItems
  const placed=[]; // alias for synapse drawing
  const positions=[];

  placedItems.forEach(({x:bx,y:by,w,h:totalNodeH,item})=>{
    const sz=nodeSize(item);
    const mediaH=sz>110?sz*0.7:sz*0.85;
    const infoH=sz>70?30:0;
    const h=mediaH+infoH;

    const reactions=totalR(item.reacts);
    const hasGlow=reactions>100;

    const node=document.createElement('div');

      aura.style.borderRadius='inherit';
      node.appendChild(aura);
    }

    // Card
    const card=document.createElement('div');card.className='node-card';
    card.style.borderColor=`rgba(${TC[item.t].rgb},${.1+item.imp*.15})`;

    cv.style.cssText='width:100%;height:100%;display:block';media.appendChild(cv);

    const icon=document.createElement('div');icon.className='node-icon';icon.textContent=item.icon;media.appendChild(icon);
    if(item.dur){const dur=document.createElement('div');dur.className='node-dur';dur.textContent=item.dur;media.appendChild(dur)}
    if(item.comments>5){const cm=document.createElement('div');cm.className='node-comments';cm.textContent='💬 '+item.comments;media.appendChild(cm)}
    card.appendChild(media);

    // Info
    if(sz>70){
      const info=document.createElement('div');info.className='node-info';
      info.innerHTML=`<div class="node-info-track" style="color:${TC[item.t].c}">${TN[item.t]}</div><div class="node-info-title">${item.title}</div>`;
      card.appendChild(info);
    }
    node.appendChild(card);

    // Reactions (outside card, never clipped)
    const top3=topR(item.reacts,3);
    if(top3.length>0&&sz>=50){
      const rDiv=document.createElement('div');rDiv.className='node-reacts';
      top3.forEach(([emoji,cnt])=>{const p=document.createElement('div');p.className='rpill';p.innerHTML=`${emoji}<span class="rc">${cnt>=1000?(cnt/1000).toFixed(1)+'k':cnt}</span>`;rDiv.appendChild(p)});
      node.appendChild(rDiv);
    }

    // Artist Mode: attach long-press handler
    if(typeof isArtistMode!=='undefined'&&isArtistMode){
      attachLongPress(node,item);
    }

    canvas.appendChild(node);
    positions.push({item,cx:bx+w/2,cy:by+h/2});
  });

  drawSynapses(positions,totalH);
}

function drawSynapses(pos,totalH){
  const svg=document.getElementById('syn');svg.innerHTML='';
  svg.setAttribute('width','100%');svg.setAttribute('height',totalH);svg.style.height=totalH+'px';

  // SVG defs for glow filters
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  TK.forEach(t=>{
    const filter=document.createElementNS('http://www.w3.org/2000/svg','filter');
    filter.setAttribute('id','glow-'+t);filter.setAttribute('x','-50%');filter.setAttribute('y','-50%');filter.setAttribute('width','200%');filter.setAttribute('height','200%');
    const blur=document.createElementNS('http://www.w3.org/2000/svg','feGaussianBlur');blur.setAttribute('stdDeviation','3');blur.setAttribute('result','blur');filter.appendChild(blur);
    const merge=document.createElementNS('http://www.w3.org/2000/svg','feMerge');
    const n1=document.createElementNS('http://www.w3.org/2000/svg','feMergeNode');n1.setAttribute('in','blur');merge.appendChild(n1);
    const n2=document.createElementNS('http://www.w3.org/2000/svg','feMergeNode');n2.setAttribute('in','SourceGraphic');merge.appendChild(n2);
    filter.appendChild(merge);defs.appendChild(filter);
  });
  svg.appendChild(defs);

  // Same-track temporal connections
  TK.forEach(track=>{
    const items=pos.filter(p=>p.item.t===track).sort((a,b)=>a.item.d-b.item.d||b.item.h-a.item.h);
    const rgb=TC[track].rgb;
    for(let i=0;i<items.length-1;i++){
      const a=items[i],b=items[i+1];
      const dist=Math.sqrt((a.cx-b.cx)**2+(a.cy-b.cy)**2);
      if(dist>500)continue;
      const eng=(totalR(a.item.reacts)+totalR(b.item.reacts))/2;
      const opacity=Math.min(.08+eng/1500,.4);
      const width=.8+Math.min(eng/300,2.5);

      const mx=(a.cx+b.cx)/2;const dy=(b.cy-a.cy);
      const cx1=a.cx+(b.cx-a.cx)*.25+(dy*.15);
      const cy1=a.cy+(b.cy-a.cy)*.25;
      const cx2=a.cx+(b.cx-a.cx)*.75-(dy*.15);
      const cy2=a.cy+(b.cy-a.cy)*.75;

      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M${a.cx},${a.cy} C${cx1},${cy1} ${cx2},${cy2} ${b.cx},${b.cy}`);
      path.setAttribute('stroke',`rgba(${rgb},${opacity})`);
      path.setAttribute('stroke-width',width);
      path.setAttribute('fill','none');
      path.setAttribute('stroke-linecap','round');
      path.setAttribute('filter',`url(#glow-${track})`);
      svg.appendChild(path);
    }
  });

  // Cross-track connections (same day or ±1 day, different tracks)
  // Simulates "AI-detected thematic links + shared audience correlation"
  const crossPairs=[];
  for(let i=0;i<pos.length;i++)for(let j=i+1;j<pos.length;j++){
    const a=pos[i],b=pos[j];
    if(a.item.t===b.item.t)continue;
    if(Math.abs(a.item.d-b.item.d)>1)continue; // same day or adjacent
    const dist=Math.sqrt((a.cx-b.cx)**2+(a.cy-b.cy)**2);
    if(dist>450)continue;
    // "Shared audience" strength: average engagement similarity
    const engA=totalR(a.item.reacts),engB=totalR(b.item.reacts);
    const strength=Math.min((engA+engB)/800,1);
    crossPairs.push({a,b,strength,dist});
  }

  crossPairs.forEach(({a,b,strength})=>{
    // Blend the two track colors
    const rgbA=TC[a.item.t].rgb.split(',').map(Number);
    const rgbB=TC[b.item.t].rgb.split(',').map(Number);
    const mr=((rgbA[0]+rgbB[0])/2)|0;
    const mg=((rgbA[1]+rgbB[1])/2)|0;
    const mb=((rgbA[2]+rgbB[2])/2)|0;

    const opacity=.06+strength*.12; // 0.06 ~ 0.18
    const width=.5+strength*1;

    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    const mx=(a.cx+b.cx)/2,my=(a.cy+b.cy)/2;
    const curve=(a.cx-b.cx)*.2;
    path.setAttribute('d',`M${a.cx},${a.cy} Q${mx+curve},${my},${b.cx},${b.cy}`);
    path.setAttribute('stroke',`rgba(${mr},${mg},${mb},${opacity})`);
    path.setAttribute('stroke-width',width);
    path.setAttribute('fill','none');
    path.setAttribute('stroke-dasharray','6,6');
    path.setAttribute('stroke-linecap','round');
    svg.appendChild(path);
  });
}

function toggleSolo(t){state.solo=state.solo===t?null:t;state.muted.delete(t);updateVis()}
function toggleMute(t){if(state.solo===t)state.solo=null;state.muted.has(t)?state.muted.delete(t):state.muted.add(t);updateVis()}
function updateVis(){
  TK.forEach(t=>{
    const off=state.muted.has(t)||(state.solo&&state.solo!==t);
    document.querySelectorAll(`.node[data-t="${t}"]`).forEach(e=>e.classList.toggle('hidden',off));
    document.querySelectorAll(`.chip[data-track="${t}"]`).forEach(e=>{e.classList.toggle('muted',off);e.classList.toggle('solo',state.solo===t)});
    document.querySelectorAll(`.sb[data-t="${t}"]`).forEach(e=>e.classList.toggle('on',state.solo===t));
    document.querySelectorAll(`.mb[data-t="${t}"]`).forEach(e=>e.classList.toggle('on',state.muted.has(t)));
  });
}

function toggleReaction(item,emoji,el){
  const key=item.title;
  if(!userReacts.has(key))userReacts.set(key,new Set());
  const my=userReacts.get(key);
  if(my.has(emoji)){
    my.delete(emoji);item.reacts[emoji]=Math.max(0,(item.reacts[emoji]||1)-1);
  }else{
    my.add(emoji);item.reacts[emoji]=(item.reacts[emoji]||0)+1;
  }
  el.classList.add('bounce');
  setTimeout(()=>el.classList.remove('bounce'),250);
  renderReactions(item);
}

function addNewReaction(item,emoji){
  const key=item.title;
  if(!userReacts.has(key))userReacts.set(key,new Set());
  userReacts.get(key).add(emoji);
  if(!item.reacts[emoji])item.reacts[emoji]=0;
  item.reacts[emoji]++;
  renderReactions(item);
}

function renderConnected(item){
  const wrap=document.getElementById('exConnected');wrap.innerHTML='';

  // Header
  const hdr=document.createElement('div');hdr.className='ex-connected-hdr';hdr.textContent='Connected Posts';
  wrap.appendChild(hdr);

  // Find connected posts: same track ±2 days + same day different track
  const connected=[];
  DATA.forEach(other=>{
    if(other===item)return;
    if(other.t===item.t&&Math.abs(other.d-item.d)<=2){
      connected.push({item:other,type:'linked',label:'🔗 Linked'});
    }else if(other.d===item.d&&other.t!==item.t){
      connected.push({item:other,type:'audience',label:'👥 Audience'});
    }else if(Math.abs(other.d-item.d)<=1&&other.t!==item.t){
      const engA=totalR(item.reacts),engB=totalR(other.reacts);
      if(engA>100&&engB>100)connected.push({item:other,type:'related',label:'✨ Related'});
    }
  });

  // Limit and sort by engagement
  connected.sort((a,b)=>totalR(b.item.reacts)-totalR(a.item.reacts));
  const shown=connected.slice(0,8);

  if(shown.length===0){
    const empty=document.createElement('div');empty.style.cssText='font-size:12px;color:var(--text3);margin-bottom:12px';
    empty.textContent='No connected posts found.';wrap.appendChild(empty);return;
  }

  // Horizontal scroll container
  const scroll=document.createElement('div');scroll.className='ex-connected-scroll';

  shown.forEach(({item:other,label})=>{
    const card=document.createElement('div');card.className='ex-conn-card';
    const c=TC[other.t];

    // Mini node with glow
    const node=document.createElement('div');node.className='ex-conn-node';
    node.style.boxShadow=`0 0 12px rgba(${c.rgb},0.3)`;
    const miniCv=document.createElement('canvas');
    drawThumb(miniCv,other,48,48);miniCv.style.cssText='position:absolute;inset:0;width:100%;height:100%;border-radius:inherit';
    const iconOv=document.createElement('span');iconOv.className='icon-ov';iconOv.textContent=other.icon;
    node.appendChild(miniCv);node.appendChild(iconOv);

    const title=document.createElement('div');title.className='ex-conn-title';title.textContent=other.title;
    const track=document.createElement('div');track.className='ex-conn-track';track.style.color=c.c;track.textContent=TN[other.t];
    const badge=document.createElement('div');badge.className='ex-conn-badge';badge.textContent=label;

    card.appendChild(node);card.appendChild(title);card.appendChild(track);card.appendChild(badge);
    card.onclick=()=>openEx(other,true);
    scroll.appendChild(card);
  });

  wrap.appendChild(scroll);

  // View thread button
  const threadBtn=document.createElement('div');threadBtn.className='ex-view-thread';

  threadBtn.onclick=()=>showToast('Thread view coming soon');

// === Long Press Handler ===
function attachLongPress(nodeEl,item){
  let timer=null,moved=false,sx=0,sy=0;
  const start=(x,y)=>{sx=x;sy=y;moved=false;timer=setTimeout(()=>{if(!moved)showCtxMenu(x,y,item)},500)};
  const move=(x,y)=>{if(Math.abs(x-sx)>10||Math.abs(y-sy)>10){moved=true;clearTimeout(timer)}};
  const end=()=>clearTimeout(timer);
  nodeEl.addEventListener('touchstart',e=>{const t=e.touches[0];start(t.clientX,t.clientY)},{passive:true});
  nodeEl.addEventListener('touchmove',e=>{const t=e.touches[0];move(t.clientX,t.clientY)},{passive:true});
  nodeEl.addEventListener('touchend',end);
  nodeEl.addEventListener('touchcancel',end);
  // Mouse fallback
  nodeEl.addEventListener('mousedown',e=>{if(e.button===0)start(e.clientX,e.clientY)});
  nodeEl.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  nodeEl.addEventListener('mouseup',end);
}

// === Context Menu ===
function showCtxMenu(x,y,item){
  ctxTarget=item;
  const menu=document.getElementById('ctxMenu');
  // Position with viewport clamping
  menu.style.display='block';
  const mw=menu.offsetWidth,mh=menu.offsetHeight;
  const vw=window.innerWidth,vh=window.innerHeight;
  let mx=Math.min(x,vw-mw-8),my=Math.min(y,vh-mh-8);
  mx=Math.max(8,mx);my=Math.max(8,my);
  menu.style.left=mx+'px';menu.style.top=my+'px';
  menu.classList.add('vis');
  // Prevent the node click from firing
  setTimeout(()=>{
    document.addEventListener('click',closeCtxMenu,{once:true});
  },10);
}

  document.getElementById('ctxMenu').style.display='none';

    const info=n.querySelector('.node-info-title');
    if(info&&info.textContent===ctxTarget.title){
      n.style.transition='opacity .3s,transform .3s';n.style.opacity='0';n.style.transform='scale(0.8)';
    }
  });
  // Remove from DATA
  const idx=DATA.findIndex(d=>d===ctxTarget);
  if(idx>-1)DATA.splice(idx,1);
  // Close bottom sheet if it was showing this item
  if(currentExItem===ctxTarget)closeEx();
  ctxTarget=null;
  showToast('Post deleted');
  // Re-layout after animation
  setTimeout(()=>layout(),350);
}

// === Importance Edit (placeholder) ===
function showImportanceEdit(){
  closeCtxMenu();
  showToast('Importance editor coming soon');
}

// === Edit Mode ===
let editingItem=null;
function enterEditMode(){
  closeCtxMenu();
  const item=ctxTarget||currentExItem;
  if(!item)return;
  editingItem=item;
  // If bottom sheet is not open, open it first
  if(!currentExItem)openEx(item);
  // Replace title and desc with editable fields
  const titleEl=document.getElementById('exT');
  const descEl=document.getElementById('exDe');
  titleEl.innerHTML=`<input class="edit-input" id="editTitle" value="${item.title.replace(/"/g,'&quot;')}" style="font-size:19px;font-weight:600"/>`;
  descEl.innerHTML=`<textarea class="edit-input" id="editDesc" rows="3" style="font-size:13px">${item.desc}</textarea>`;
  // Add save/cancel bar
  const bar=document.createElement('div');bar.className='edit-bar';bar.id='editBar';
  bar.innerHTML=`<button class="eb-save" onclick="saveEdit()">Save</button><button class="eb-cancel" onclick="cancelEdit()">Cancel</button>`;
  descEl.after(bar);
}
function saveEdit(){
  if(!editingItem)return;
  const title=document.getElementById('editTitle').value.trim();
  const desc=document.getElementById('editDesc').value.trim();
  if(title)editingItem.title=title;
  editingItem.desc=desc;
  exitEditMode();
  openEx(editingItem,false);
  layout();
  showToast('Changes saved');
}
function cancelEdit(){
  exitEditMode();
  if(editingItem)openEx(editingItem,false);
}
function exitEditMode(){
  const bar=document.getElementById('editBar');
  if(bar)bar.remove();
  editingItem=null;
}

// === Init ===
buildChips();layout();
updateModeUI();
window.addEventListener('resize',()=>layout());
</script>
</body>
</html>
