name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: backend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: backend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://gleisner:gleisner@localhost:5432/gleisner
    steps:
      - uses: actions/checkout@v4
      - name: Start PostgreSQL
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER gleisner WITH PASSWORD 'gleisner' CREATEDB;"
          sudo -u postgres psql -c "CREATE DATABASE gleisner OWNER gleisner;"
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: backend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:push
      - run: pnpm test

  frontend-lint-and-format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.10
          channel: stable
          cache: true
      - run: flutter pub get
      # NOTE: 既存コードベースに warning/info レベルの lint が 84 件残っている
      # ため `--no-fatal-warnings --no-fatal-infos` でエラーのみゲート。新規
      # コード由来の error（コンパイル不能・型不整合等）は引き続き検出する。
      # 既存 lint クリーンアップは別 PR で対応。
      - run: flutter analyze --no-fatal-warnings --no-fatal-infos
      - run: dart format --set-exit-if-changed lib test

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.10
          channel: stable
          cache: true
      - run: flutter pub get
      # `dart:js_interop` / `package:web` を推移的 import するテストがあるため
      # `--platform chrome` 必須（CLAUDE.md 参照）。ubuntu-latest には Chrome
      # がプリインストールされている。
      - run: flutter test --platform chrome

  frontend-test-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.10
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test test/integration --platform chrome
