services:
  postgres:
    image: postgres:16-alpine
    container_name: gleisner-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: gleisner
      POSTGRES_PASSWORD: gleisner
      POSTGRES_DB: gleisner
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gleisner"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
